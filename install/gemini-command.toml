# Drop this at ~/.gemini/commands/insights.toml so Gemini CLI exposes `/insights`.

description = "Analyze local agent session history (Claude Code/Codex/Gemini/OpenCode) and generate an HTML usage report"

prompt = """
You are running the cross-agent `insights` skill. The full workflow lives at
__INSIGHTS_DIR__/SKILL.md; this prompt inlines the essentials so you
don't have to read it unless you want extra context.

User extra args: {{args}}

## 5-step workflow

1. Detect host agent (auto-detection is best-effort; fall back to whatever the user used):
   `python3 __INSIGHTS_DIR__/scripts/insights.py detect`

2. Quantitative metadata (default 60 days, ≤80 sessions, skip warmups):
   `python3 __INSIGHTS_DIR__/scripts/insights.py metadata --agent <agent> --days 60 --limit 80 --min-messages 2 --workdir ~/.insights-workspace/<agent>`

3. Per-session facet extraction. For each metadata file, read its transcript and
   emit a facet JSON to `<workdir>/facets/<session_id>.json` per the schema in
   `__INSIGHTS_DIR__/references/facet_schema.md`. Required fields include
   `evidence_quote` — pick a real line from the transcript so I know you read it.

   `python3 __INSIGHTS_DIR__/scripts/insights.py transcript --agent <agent> --session <id> --max-chars 18000`

4. Aggregate to a `report.json` per `__INSIGHTS_DIR__/references/report_schema.md`.

5. Render HTML:
   `python3 __INSIGHTS_DIR__/scripts/insights.py render --data <workdir>/report.json --out <workdir>/report.html`

## Quality bar — do NOT skip these

- Use concrete evidence: every finding cites a session id (and ideally an evidence_quote).
  Vague claims like "user seems efficient" are useless.
- Friction is honest: name what the agent got wrong. Don't sanitise the failure modes.
- Suggestions must be runnable: CLAUDE.md / AGENTS.md additions = exact text to paste;
  features = install/enable commands; usage patterns = copyable prompts.
- Match the user's language (中文 ↔ English).
- Use canonical `goal_categories` labels only (see facet_schema.md) so aggregation works.

## Heuristics for filling the facet

- `git_commits > 0` → leans toward `release_engineering` / shipping mindset.
- `user_interruptions > 0` plus "stop" / "wait" in transcript → `wrong_approach` or `needed_pushback`.
- `tool_errors` plus repeated "fix" attempts → `buggy_code`.
- The last few transcript messages reveal `outcome` and `user_satisfaction_counts`.
- For Codex/Gemini/OpenCode, `tokens` semantics differ across agents — quote, don't compare.

Tell the user where the HTML lives at the end.
"""
